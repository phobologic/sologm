[pytest]
# Test discovery
testpaths = sologm
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
console_output_style = progress
log_cli = false
log_level = INFO

markers =
    game: tests for the Game class
    mythic: tests for the MythicGMEGame class
    functions: tests for game-related functions 